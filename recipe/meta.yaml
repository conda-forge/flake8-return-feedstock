{% set name = "flake8-return" %}
{% set version = "1.2.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/flake8-return-{{ version }}.tar.gz
  sha256: 68dfa56582cd704febd02ad86dcf5df67e38e0836d62f1ceae7930d76d3dd955

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - poetry
    - python {{ python_min }}
  run:
    - flake8-plugin-utils >=1.0,<2.0
    - python >={{ python_min }},<4.0

test:
  imports:
    - flake8_return
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/flake8-return
  summary: Flake8 plugin that checks return values
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
